<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>
    <link rel="stylesheet" href="/static/cropstyle.css">
</head>
<body>

    <div class="box">
        <h1>🌾 Crop Recommendation</h1>

        <form action="/crop_result" method="post">
            <input type="number" name="nitrogen" placeholder="Nitrogen (N)" required><br>
            <input type="number" name="phosphorus" placeholder="Phosphorus (P)" required><br>
            <input type="number" name="potassium" placeholder="Potassium (K)" required><br>
            <input type="number" name="ph" placeholder="pH value" required><br>
            <input type="number" name="temperature" placeholder="Temperature" required><br>
            <input type="number" name="humidity" placeholder="Humidity" required><br>
            <input type="number" name="rainfall" placeholder="Rainfall" required><br>

            <button type="submit">Get Recommendation</button>
        </form>
        <a href="{{ url_for('home') }}">⬅ Back to Home</a>
    </div>

</body>
</html>
